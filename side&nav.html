<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Basic Information | Pubali Bank PLC</title>
  <!-- Standard PNG Icon -->
  <link rel="icon" type="image/png" href="/assets/images/icon.png" sizes="32x32" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/appdash.css" />
</head>

<body>
  <!-- Main Flex wrapper ensures clean column rendering instead of standard bootstrap row behavior -->
  <div class="dash-wrapper">
    <!-- Left Sidebar Viewport Container -->
    <div class="sidebar d-none d-lg-flex flex-column justify-content-between">
      <div>
        <div class="logo-wrapper">
          <img src="assets/images/pbplc.svg" alt="Pubali Logo" style="max-width: 180px; width: 100%; height: auto" />
        </div>
        <div class="profile-card text-center">
          <img src="assets/images/fahim.png" class="rounded-circle profile-img mb-2" alt="User profile" />
          <h6 class="fw-bold mb-1" style="color: var(--brand-primary)">
            Md. Fahim
          </h6>
          <span class="badge bg-white text-success border px-2 py-1" style="font-size: 0.75rem; font-weight: 600">ID :
            1284647</span>
        </div>
        <div class="d-flex flex-column">
          <a class="nav-link-custom" href="#"><i class="bi bi-grid-1x2"></i>
            Dashboard</a>
          <a class="nav-link-custom active" href="#"><i class="bi bi-person-vcard"></i> Profile</a>
          <a class="nav-link-custom" href="#"><i class="bi bi-briefcase"></i>
            Applied Jobs</a>
          <a class="nav-link-custom" href="#"><i class="bi bi-bookmark-heart"></i> Favourite Jobs</a>
          <a class="nav-link-custom" href="#"><i class="bi bi-bell"></i> Job
            Alerts</a>
          <a class="nav-link-custom" href="#"><i class="bi bi-shield-lock"></i> Settings</a>
        </div>
      </div>

      <!-- Desktop Logout Row Link Anchor Block -->
      <div>
        <a class="nav-link-custom nav-link-logout" href="#">
          <i class="bi bi-box-arrow-left"></i> Logout
        </a>
      </div>
    </div>

    <!-- Mobile Sidebar Menu Component -->
    <div class="offcanvas offcanvas-start w-75" id="mobileSidebar" tabindex="-1">
      <div class="d-flex flex-column justify-content-between h-100">
        <div>
          <div class="offcanvas-header border-bottom">
            <img src="assets/images/pbplc.svg" alt="Pubali Logo" style="max-width: 180px; width: 100%; height: auto" />
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
          </div>
          <div class="offcanvas-body p-0">
            <div class="profile-card text-center my-3 mx-3">
              <img src="assets/images/fahim.png" class="rounded-circle profile-img mb-2" alt="User profile" />
              <h6 class="fw-bold mb-1" style="color: var(--brand-primary)">
                Md. Fahim
              </h6>
              <span class="badge bg-white text-success border px-2 py-1" style="font-size: 0.75rem; font-weight: 600">ID
                :
                1284647</span>
            </div>
            <div class="d-flex flex-column">
              <a class="nav-link-custom" href="#"><i class="bi bi-grid-1x2"></i> Dashboard</a>
              <a class="nav-link-custom active" href="#"><i class="bi bi-person-vcard"></i> Profile</a>
              <a class="nav-link-custom" href="#"><i class="bi bi-briefcase"></i> Applied Jobs</a>
              <a class="nav-link-custom" href="#"><i class="bi bi-bookmark-heart"></i> Favourite Jobs</a>
              <a class="nav-link-custom" href="#"><i class="bi bi-bell"></i>
                Job Alerts</a>
              <a class="nav-link-custom" href="#"><i class="bi bi-shield-lock"></i> Settings</a>
            </div>
          </div>
        </div>

        <!-- Mobile Drawer Panel Logout Button Container -->
        <div class="px-0">
          <a class="nav-link-custom nav-link-logout" href="#">
            <i class="bi bi-box-arrow-left"></i> Logout
          </a>
        </div>
      </div>
    </div>

    <!-- Right Side Main Content Viewport -->
    <div class="main-content d-flex flex-column">
      <!-- Nav Bar Header Component -->
      <nav class="navbar sticky-top bg-white border-bottom px-4 py-2">
        <div class="d-flex align-items-center w-100 justify-content-between">
          <div class="d-flex align-items-center gap-2">
            <button class="btn btn-light d-lg-none input-group-text nav-icon-btn" type="button"
              data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
              <i class="bi bi-list fs-4"></i>
            </button>
            <div class="search-container d-none d-sm-block position-relative">
              <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-secondary"></i>
              <input class="form-control search-input ps-5" type="search" placeholder="Search parameters..."
                id="dashboardSearch" style="border-radius: 20px; min-width: 260px" />
            </div>
          </div>

          <div class="d-flex align-items-center gap-3">
            <div class="position-relative nav-icon-btn cursor-pointer" id="notificationBell">
              <i class="bi bi-bell fs-5"></i>
              <span
                class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>
            </div>
            <div class="vr my-2 text-secondary opacity-25" style="height: 24px"></div>
            <div class="d-flex align-items-center gap-2">
              <img src="assets/images/fahimsm.png" width="36" height="36" class="rounded-circle border profile-pic-sync"
                alt="Profile Layout" />
              <span class="fw-semibold d-none d-md-inline user-name-sync" style="font-size: 0.85rem">Md. Fahim</span>
            </div>
          </div>
        </div>
      </nav>

      <!-- Middle Inner Form/Content Canvas Placeholder Area -->
      <div class="flex-grow-1 p-4">
        <!-- 
              Your primary profile setup/basic information layout content forms 
              live directly inside this flex-grow container box block.
          -->
      </div>

      <!-- Application Dashboard Baseline Responsive Footer Layout -->
      <footer class="dash-footer">
        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center gap-2">
          <div>
            <span>&copy; 2026 <strong>Pubali Bank PLC.</strong> All rights
              reserved.</span>
          </div>
          <div class="d-flex gap-3">
            <a href="#" class="text-decoration-none text-secondary">Privacy
              Policy</a>
            <a href="#" class="text-decoration-none text-secondary">Terms of
              Service</a>
            <a href="#" class="text-decoration-none text-secondary">Support</a>
          </div>
        </div>
      </footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
