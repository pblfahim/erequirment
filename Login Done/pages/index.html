<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Pubali Bank PLC.</title>

    <!-- =========================================================================
         VENDORS & CORE ASSETS
         ========================================================================= -->
    <!-- Brand Identity: Favicon configuration -->
    <link rel="icon" type="image/png" href="../assets/images/icon.png" sizes="32x32">
    <!-- UI Framework: Bootstrap v5.3.3 Core Layout Stylesheet -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Iconography: FontAwesome v6.5.2 Asset Vector Library -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <!-- Typography: Corporate Google Web Fonts Engine -->
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&family=Public+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Theme Override: Core Application Business Layout Stylesheet -->
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

    <!-- =========================================================================
         DECORATIVE BRAND CANVAS LAYER (Muted from Screen Readers)
         ========================================================================= -->
    <div class="bg-blobs-container" aria-hidden="true">
        <div class="bg-left"></div>
        <div class="bg-right"></div>
    </div>

    <!-- =========================================================================
         MAIN APPLICATION SURFACE
         ========================================================================= -->
    <div class="main-content" role="main">
        <div class="card auth-card">

            <!-- MODULE: Authentic Branding & System Identification Header -->
            <div class="auth-header">
                <div class="brand-logo-fallback">
                    <img src="../assets/images/pbllogo.svg" alt="Pubali Bank Logo" width="40" height="40">
                </div>
                <div class="header-title-area">
                    <div class="title-bangla">
                        <img src="../assets/images/pbllogotext.svg" alt="Pubali Bank" width="170" height="40">
                    </div>
                </div>
                <div class="system-tag">
                    E-recruitment System
                </div>
            </div>

            <!-- MODULE: Portal Authentication Surface -->
            <div class="auth-body">
                <h2>Sign in</h2>
                <div class="account-switch-text">
                    Don’t have account? <a href="OTP.html">Create Account</a>
                </div>

                <form id="signInForm" autocomplete="on" novalidate>

                    <!-- FIELD MODULE: IDENTITY ENTRY (Hybrid Mobile or Email Input) -->
                    <div class="mb-3">
                        <label for="identityField" class="form-label">Mobile Number / Email Address</label>
                        <input type="text" class="form-control" id="identityField" name="username"
                            placeholder="e.g., 017XXXXXXXX or name@email.com" required autocomplete="username"
                            aria-describedby="identityFeedback">
                        <!-- Custom validation display area -->
                        <div class="validation-feedback" id="identityFeedback" style="display: none;" role="alert">
                            Please enter a valid email address or mobile number.
                        </div>
                    </div>

                    <!-- FIELD MODULE: SECURITY CREDENTIAL ENTRY -->
                    <div class="mb-3">
                        <label for="passwordField" class="form-label">Password</label>
                        <div class="password-container">
                            <input type="password" class="form-control" id="passwordField" name="password"
                                placeholder="Enter Password" required autocomplete="current-password">
                            <!-- Visibility Toggle Handle. Programmatically managed to support screen readers -->
                            <span class="password-toggle-icon" id="passwordToggle" onclick="handlePasswordToggle()"
                                role="button" aria-label="Toggle password visibility" tabindex="0">
                                <i class="fa-regular fa-eye" id="toggleIcon" aria-hidden="true"></i>
                            </span>
                        </div>
                    </div>

                    <!-- ACTION DISPATCH MODULE: Contextual Submit State -->
                    <button type="submit" id="submitBtn" class="btn btn-signin" disabled>
                        Sign In <i class="fa-solid fa-arrow-right-long ms-1" aria-hidden="true"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- =========================================================================
         APPLICATION FOOTER AREA
         ========================================================================= -->
    <footer>
        <div class="footer-container">
            <div>
                © 2026 Pubali HR Management System. All rights reserved.
            </div>
            <div>
                Last updated: June 15, 2026 &nbsp; &nbsp; | &nbsp; &nbsp; System Version: v1.0.0
            </div>
        </div>
    </footer>

    <!-- =========================================================================
         CORE JAVASCRIPT ENGINE & SYSTEM STAGED TRANSITIONS
         ========================================================================= -->
    <!-- Native Bootstrap Bundle (includes Popper.js for drop-downs/overlays) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core Application Logic Layer (Form validation and password visibility toggle engines) -->
    <script src="../assets/js/login.js"></script>
</body>

</html>
