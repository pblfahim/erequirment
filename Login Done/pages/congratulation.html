<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Congratulations - Pubali Bank PLC.</title>

  <!-- =========================================================================
       CORE DEPLOYMENT & GLOBAL STYLESHEET DEPENDENCIES
       ========================================================================= -->
  <!-- Brand Identity: Favicon (Corrected duplicate slash path to ensure relative loading) -->
  <link rel="icon" type="image/png" href="../assets/images/icon.png" sizes="32x32">
  <!-- Layout Engine: Bootstrap CSS (v5.3.3) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Visuals: FontAwesome Vectors (v6.5.2) used across E-recruitment forms -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <!-- Web Fonts: Public Sans (primary interface) & Noto Sans Bengali (localized brand) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&family=Public+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <!-- Core Design Token Overrides & System Styling Definitions -->
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
  <!-- =========================================================================
       DECORATIVE BRAND CANVAS LAYER
       ========================================================================= -->
  <div class="bg-blobs-container" aria-hidden="true">
    <div class="bg-left"></div>
    <div class="bg-right"></div>
  </div>

  <!-- =========================================================================
       MAIN USER DASHBOARD WRAPPER
       ========================================================================= -->
  <div class="main-content" role="main">
    <div class="card auth-card">

      <!-- HEADER COMPONENT: System Brand Identifier -->
      <div class="auth-header">
        <div class="brand-logo-fallback">
          <img src="../assets/images/pbllogo.svg" alt="Pubali Logo" width="40" height="40" />
        </div>
        <div class="header-title-area">
          <div class="title-bangla">
            <img src="../assets/images/pbllogotext.svg" alt="Pubali Bank" width="170" height="40" />
          </div>
        </div>
        <div class="system-tag">E-recruitment System</div>
      </div>

      <!-- BODY COMPONENT: Status Context Area -->
      <div class="card-body-custom">

        <!-- SUCCESS BANNER: 
             - Added "alert-success" class to complete standard bootstrap class mapping.
             - Added role="status" to announce successful state updates to screen readers. -->
        <div class="d-flex alert" role="status">
          <div>
            <!-- Visual asset with "presentation" alt tag to avoid screen reader clutter -->
            <div class="congrats-text-3d">
              <img src="../assets/images/congrats.gif" alt="Success Celebration Animation" width="320" height="130" />
            </div>

            <!-- Information Message Area -->
            <div class="status-heading">Your Registration is Complete 🎉</div>
            <br />

            <!-- TEMPLATE INJECTION TARGET:
                 Note to Engineering: The ${applicantId} parameter is a dynamic string literal.
                 Ensure the server-side view processor (Thymeleaf, ASP.NET Razor, EJS, JSP) 
                 properly sanitizes this output before rendering to prevent XSS. -->
            Your permanent Profile Reference ID is:
            <strong class="text-decoration-underline">${applicantId}</strong>.<br />

            <span class="mt-4 d-block status-description">
              Applicant registration is now complete.
          </div>
        </div>

        <!-- ACTION MATRIX: Call to Actions -->
        <div class="d-flex justify-content-center gap-4 mt-4">
          <a href="#" class="btn btn-view-dashboard px-4">View Dashboard</a>

          <!-- UI Integration Fix: 
               Replaced the Bootstrap Icon selector class ("bi bi-arrow-right") with FontAwesome ("fa-solid fa-arrow-right") 
               to keep assets consistent with our imported dependencies. -->
          <a href="#" class="btn btn-create-profile px-4">
            Complete Profile <i class="fa-solid fa-arrow-right ms-1" aria-hidden="true"></i>
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- =========================================================================
       APPLICATION FOOTER AREA
       ========================================================================= -->
  <footer>
    <div class="footer-container">
      <div>© 2026 Pubali HR Management System. All rights reserved.</div>
      <div>
        Last updated: June 15, 2026 &nbsp; &nbsp; | &nbsp; &nbsp; System
        Version: v1.0.0
      </div>
    </div>
  </footer>

  <!-- =========================================================================
         CORE JAVASCRIPT ENGINE & SYSTEM STAGED TRANSITIONS
         ========================================================================= -->
  <!-- Bootstrap JS bundle containing Popper.js for drop-downs/overlays -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
