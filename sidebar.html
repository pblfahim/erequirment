<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">
    <style>body{

    background:#f5f7fb;
    font-family:Segoe UI,sans-serif;
}

.logo{

    height:45px;
}

.navbar{

    height:72px;
}

.search-box{

    margin-left:50px;
    width:380px;
    position:relative;
}

.search-box input{

    width:100%;
    padding:10px 20px 10px 45px;
    border:none;
    border-radius:8px;
    background:#f3f5f8;
}

.search-box i{

    position:absolute;
    top:11px;
    left:15px;
    color:#666;
}

.top-user{

    width:42px;
    height:42px;
    border-radius:50%;
    object-fit:cover;
}

.notification{

    width:8px;
    height:8px;
    background:red;
    border-radius:50%;
    position:absolute;
    top:8px;
    right:12px;
}

.sidebar{

    width:250px;
    position:fixed;
    top:72px;
    left:0;
    bottom:0;
    background:#fff;
    box-shadow:0 0 15px rgba(0,0,0,.08);
}

.profile{

    text-align:center;
    padding:25px;
}

.profile img{

    width:80px;
    height:80px;
    border-radius:50%;
}

.profile p{

    color:#777;
    font-size:13px;
}

.sidebar ul{

    list-style:none;
    padding:0;
}

.sidebar ul li{

    margin:6px 15px;
}

.sidebar ul li a{

    text-decoration:none;
    color:#555;
    display:block;
    padding:13px 18px;
    border-radius:10px;
    transition:.3s;
}

.sidebar ul li.active a{

    background:#008c45;
    color:#fff;
}

.sidebar ul li a:hover{

    background:#008c45;
    color:#fff;
}

.sidebar i{

    margin-right:10px;
}

.logout{

    position:absolute;
    left:20px;
    right:20px;
    bottom:20px;
    border:none;
    background:#e9ecef;
    padding:12px;
    border-radius:10px;
}

.main-content{

    margin-left:270px;
    margin-top:95px;
    padding:25px;
}

.stepper{

    display:flex;
    justify-content:space-between;
}

.step{

    flex:1;
    padding:18px;
    text-align:center;
    color:#666;
    border-bottom:3px solid transparent;
    transition:.3s;
}

.step.active{

    color:#000;
    border-bottom:3px solid #ff5a36;
    font-weight:600;
}

.step.completed{

    color:#198754;
}

.step i{

    margin-right:8px;
}

.card{

    border-radius:12px;
}

.card-header{

    padding:20px 30px;
}

.card-body{

    padding:30px;
}

.form-control,
.form-select{

    height:48px;
    border-radius:8px;
}

.btn-success{

    background:#14c784;
    border:none;
}

.btn-success:hover{

    background:#10b878;
}

footer{

    margin-top:30px;
    color:#777;
    font-size:13px;
}

@media(max-width:992px){

.sidebar{

    left:-250px;
}

.main-content{

    margin-left:0;
}

.search-box{

    display:none;
}

.stepper{

    flex-wrap:wrap;
}

.step{

    width:50%;
}

}</style>
</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg bg-white shadow-sm fixed-top">

        <div class="container-fluid">

            <img src="img/logo.png" class="logo">

            <div class="search-box">

                <i class="bi bi-search"></i>

                <input type="text" placeholder="Search">

            </div>

            <div class="ms-auto d-flex align-items-center">

                <button class="btn position-relative me-3">

                    <i class="bi bi-bell fs-5"></i>

                    <span class="notification"></span>

                </button>

                <img src="img/user.jpg" class="top-user">

            </div>

        </div>

    </nav>

    <!-- Sidebar -->

    <div class="sidebar">

        <div class="profile">

            <img src="img/user.jpg">

            <h6>Md. Fahim</h6>

            <p>Senior Officer (Comp.)</p>

        </div>

        <ul>

            <li>

                <a href="#">

                    <i class="bi bi-grid"></i>

                    Dashboard

                </a>

            </li>

            <li class="active">

                <a href="#">

                    <i class="bi bi-person"></i>

                    Profile

                </a>

            </li>

            <li>

                <a href="#">

                    <i class="bi bi-send"></i>

                    Applied Jobs

                </a>

            </li>

            <li>

                <a href="#">

                    <i class="bi bi-star"></i>

                    Favourite Jobs

                </a>

            </li>

            <li>

                <a href="#">

                    <i class="bi bi-bell"></i>

                    Job Alerts

                </a>

            </li>

            <li>

                <a href="#">

                    <i class="bi bi-lock"></i>

                    Change Password

                </a>

            </li>

        </ul>

        <button class="logout">

            <i class="bi bi-box-arrow-left"></i>

            Sign Out

        </button>

    </div>

    <!-- Main -->

    <div class="main-content">

        <!-- Steps -->

        <div class="card border-0 shadow-sm">

            <div class="stepper">

                <div class="step completed">

                    <i class="bi bi-file-earmark-text"></i>

                    CV & Documents

                </div>

                <div class="step active">

                    <i class="bi bi-layers"></i>

                    Basic Information

                </div>

                <div class="step">

                    <i class="bi bi-journal-text"></i>

                    Education

                </div>

                <div class="step">

                    <i class="bi bi-briefcase"></i>

                    Work Experience

                </div>

                <div class="step">

                    <i class="bi bi-patch-check"></i>

                    Certification

                </div>

                <div class="step">

                    <i class="bi bi-people"></i>

                    References

                </div>

            </div>

        </div>

        <!-- Form -->

        <div class="card mt-4 shadow-sm border-0">

            <div class="card-header bg-white">

                <h4>Personal Information</h4>

            </div>

            <div class="card-body">

                <div class="row g-4">

                    <div class="col-md-6">

                        <label class="form-label">

                            First Name

                        </label>

                        <input type="text" class="form-control">

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">

                            Last Name

                        </label>

                        <input type="text" class="form-control">

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">

                            Email

                        </label>

                        <input type="email" class="form-control">

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">

                            Phone

                        </label>

                        <input type="text" class="form-control">

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">

                            Date of Birth

                        </label>

                        <input type="date" class="form-control">

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">

                            Gender

                        </label>

                        <select class="form-select">

                            <option>Select</option>

                            <option>Male</option>

                            <option>Female</option>

                        </select>

                    </div>

                </div>

            </div>

            <div class="card-footer bg-white d-flex justify-content-between">

                <button class="btn btn-light px-4">

                    Cancel

                </button>

                <button class="btn btn-success px-5">

                    Save & Next

                </button>

            </div>

        </div>

        <footer>

            © 2026 Pubali HR Management System. All Rights Reserved.

        </footer>

    </div>

</body>

</html>
