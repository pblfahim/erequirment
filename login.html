<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&family=Public+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/login.css">
</head>

<body>

    <div class="bg-blobs-container">
        <div class="bg-left"></div>
        <div class="bg-right"></div>
    </div>

    <div class="main-content">
        <div class="card auth-card">

            <div class="auth-header">
                <div class="brand-logo-fallback">
                    <img src="assets/images/pbllogo.svg" alt="Pubali Logo" width="40" height="40">
                </div>
                <div class="header-title-area">
                    <div class="title-bangla">
                        <img src="assets/images/pbllogotext.svg" alt="Pubali Bank" width="170" height="40">
                    </div>
                </div>
                <div class="system-tag">
                    E-recruitment System
                </div>
            </div>

            <div class="auth-body">
                <h2>Sign in</h2>
                <div class="account-switch-text">
                    Don’t have account <a href="registration.html">Create Account</a>
                </div>

                <form id="signInForm" autocomplete="on" novalidate>
                    <div class="mb-3">
                        <label for="identityField" class="form-label">Mobile Number / Email Address</label>
                        <input type="text" class="form-control" id="identityField" name="username"
                            placeholder="e.g., 017XXXXXXXX or name@email.com" required autocomplete="username">
                        <div class="validation-feedback" id="identityFeedback">Please enter a valid email address or
                            mobile number.</div>
                    </div>

                    <div class="mb-3">
                        <label for="passwordField" class="form-label">Password</label>
                        <div class="password-container">
                            <input type="password" class="form-control" id="passwordField" name="password"
                                placeholder="Enter Password" required autocomplete="current-password">
                            <span class="password-toggle-icon" id="passwordToggle" onclick="handlePasswordToggle()">
                                <i class="fa-regular fa-eye" id="toggleIcon"></i>
                            </span>
                        </div>
                    </div>

                    <!-- Added 'disabled' attribute to match initialization state -->
                    <button type="submit" id="submitBtn" class="btn btn-signin" disabled>
                        Sign In <i class="fa-solid fa-arrow-right-long"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-container">
            <div>
                © 2026 Pubali HR Management System. All rights reserved.
            </div>
            <div>
                Last updated: June 15, 2026 &nbsp; &nbsp; | &nbsp; &nbsp; System Version: v1.0.0
            </div>
        </div>
    </footer>

    <script>
        // Smooth password look-ahead toggle handler
        function handlePasswordToggle() {
            const passwordField = document.getElementById('passwordField');
            const toggleIcon = document.getElementById('toggleIcon');

            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                toggleIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordField.type = 'password';
                toggleIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // --- Core Validation Flow Logic ---
        document.addEventListener('DOMContentLoaded', () => {
            const identityField = document.getElementById('identityField');
            const passwordField = document.getElementById('passwordField');
            const submitBtn = document.getElementById('submitBtn');
            const identityFeedback = document.getElementById('identityFeedback');
            const signInForm = document.getElementById('signInForm');

            // Evaluation functions using strict pattern checking
            function checkIdentityValidity(value) {
                const input = value.trim();
                if (!input) return { isValid: false, type: null };

                // Email structural definition check
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

                // Flexible digits format matching local standards (e.g., +8801XXXXXXXXX, 01XXXXXXXXX) or generic international numbers (10-14 digits)
                const mobileRegex = /^(?:\+?88)?01[3-9]\d{8}$|^\d{10,14}$/;

                if (emailRegex.test(input)) {
                    return { isValid: true, type: 'email' };
                } else if (mobileRegex.test(input)) {
                    return { isValid: true, type: 'mobile' };
                }

                return { isValid: false, type: null };
            }

            function evaluateFormState() {
                const identityCheck = checkIdentityValidity(identityField.value);
                const isPasswordFilled = passwordField.value.trim().length > 0;

                // Toggle the operational states matching the styling architecture
                if (identityCheck.isValid && isPasswordFilled) {
                    submitBtn.classList.add('active');
                    submitBtn.removeAttribute('disabled');
                } else {
                    submitBtn.classList.remove('active');
                    submitBtn.setAttribute('disabled', 'true');
                }
            }

            // Real-time responsiveness setup
            identityField.addEventListener('input', () => {
                evaluateFormState();

                // Remove error warning markers progressively as user updates inputs
                if (identityField.classList.contains('is-invalid-format')) {
                    const status = checkIdentityValidity(identityField.value);
                    if (status.isValid || identityField.value.trim() === '') {
                        identityField.classList.remove('is-invalid-format');
                        identityFeedback.style.display = 'none';
                    }
                }
            });

            passwordField.addEventListener('input', evaluateFormState);

            // Out-of-focus event warning checks
            identityField.addEventListener('blur', () => {
                const value = identityField.value.trim();
                if (value !== '') {
                    const status = checkIdentityValidity(value);
                    if (!status.isValid) {
                        identityField.classList.add('is-invalid-format');
                        identityFeedback.style.display = 'block';
                    }
                }
            });

            // Form Process Request Handler Intercept
            signInForm.addEventListener('submit', (e) => {
                e.preventDefault();

                const identityValue = identityField.value.trim();
                const validationStatus = checkIdentityValidity(identityValue);

                if (!validationStatus.isValid) {
                    identityField.classList.add('is-invalid-format');
                    identityFeedback.style.display = 'block';
                    return;
                }

                alert(`Authentication request successfully initiated via ${validationStatus.type.toUpperCase()}: ${identityValue}`);

                // Proceed with fetch payload compilation or standard form execution
                // signInForm.submit();
            });
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
