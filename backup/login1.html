<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&family=Public+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/login.css">
    <style>

    </style>
</head>

<body>

    <div class="bg-blobs-container">
        <div class="bg-left"></div>
        <div class="bg-right"></div>
    </div>

    <div class="main-content">
        <div class="card auth-card">

            <div class="auth-header">
                <div class="brand-logo-fallback">
                    <img src="assets/images/pbllogo.svg" alt="Paris" width="40" height="40">
                    <!-- <i class="fa-solid fa-building-columns"><a href="assets/images/pbllogo.svg">link text</a></i> -->
                </div>
                <div class="header-title-area">
                    <div class="title-bangla"><img src="assets/images/pbllogotext.svg" alt="Paris" width="170"
                            height="40"></div>
                    <!-- <div class="title-bangla">পূবালী ব্যাংক পিএলসি.</div>
                    <div class="title-english">PUBALI BANK PLC.</div> -->
                </div>
                <div class="system-tag">
                    E-recruitment System
                </div>
            </div>

            <div class="auth-body">
                <h2>Sign in</h2>
                <div class="account-switch-text">
                    Don’t have account <a href="#">Create Account</a>
                </div>

                <form id="signInForm" autocomplete="on">
                    <div class="mb-4">
                        <label for="identityField" class="form-label">Mobile Number / Email Address</label>
                        <input type="text" class="form-control" id="identityField"
                            placeholder="Mobile Number / Email Address" required autocomplete="username">
                    </div>

                    <div class="mb-4">
                        <label for="passwordField" class="form-label">Password</label>
                        <div class="password-container">
                            <input type="password" class="form-control" id="passwordField" placeholder="Enter Password"
                                required autocomplete="current-password">
                            <span class="password-toggle-icon" id="passwordToggle" onclick="handlePasswordToggle()">
                                <i class="fa-regular fa-eye" id="toggleIcon"></i>
                            </span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-signin">
                        Sign In <i class="fa-solid fa-arrow-right-long"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-container">
            <div>
                © 2026 Pubali HR Management System. All rights reserved.
            </div>
            <div>
                Last updated: June 15, 2026 &nbsp; &nbsp; | &nbsp; &nbsp; System Version: v1.0.0
            </div>
        </div>
    </footer>

    <script>
        // Implements smooth real-time eye-icon interactive visibility adjustments 
        function handlePasswordToggle() {
            const passwordField = document.getElementById('passwordField');
            const toggleIcon = document.getElementById('toggleIcon');

            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                toggleIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordField.type = 'password';
                toggleIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Form Submission Intercept Handler
        document.getElementById('signInForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const identity = document.getElementById('identityField').value;
            if (identity) {
                alert('Authentication request initiated for user: ' + identity);
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
