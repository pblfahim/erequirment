<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Pubbali Bank PLC.</title>
    <!-- Bootstrap 5.3.3 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6.5.2 CDN (for icons) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts for crisp typography -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/login.css">
    
    <style>
        :root {
            --bg-base: #bfe5d6;
            --bg-blob: #b9e3d8;
            --brand-green: #006837;
            --brand-teal: #0fa3a4;
            --text-dark: #1a1a1a;
            --link-blue: #0d6efd;
        }

        body {
            font-family: 'Public Sans', 'Noto Sans Bengali', sans-serif;
            background-color: var(--bg-base);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        .bg-blobs-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        /* --- Keyframe Animations --- */
        @keyframes floatLeftBlob {
            0% { transform: translate(0, 0) rotate(-45deg) scale(1); }
            25% { transform: translate(20px, -15px) rotate(-42deg) scale(1.03); }
            50% { transform: translate(40px, -35px) rotate(-47deg) scale(1.06); }
            75% { transform: translate(15px, -20px) rotate(-43deg) scale(1.03); }
            100% { transform: translate(0, -40px) rotate(-45deg) scale(1); }
        }

        @keyframes floatRightBlob {
            0% { transform: translate(0, 0) rotate(45deg) scale(1); }
            25% { transform: translate(-20px, 20px) rotate(48deg) scale(1.03); }
            50% { transform: translate(-40px, 40px) rotate(42deg) scale(1.06); }
            75% { transform: translate(-20px, 25px) rotate(46deg) scale(1.03); }
            100% { transform: translate(0, 0) rotate(45deg) scale(1); }
        }

        /* --- Background Shape Enhancements --- */
        .bg-left {
            position: absolute;
            width: 650px;
            height: 650px;
            background: #d6ece2;
            left: -220px;
            top: -200px;
            border-radius: 120px;
            transform: rotate(-45deg);
            animation: floatLeftBlob 20s ease-in-out infinite;
            will-change: transform;
        }

        .bg-right {
            position: absolute;
            width: 700px;
            height: 700px;
            background: #d8eee3;
            right: -250px;
            bottom: -250px;
            border-radius: 120px;
            transform: rotate(45deg);
            animation: floatRightBlob 20s ease-in-out infinite;
            will-change: transform;
        }

        /* --- Card Wrapper Styling --- */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 40px 15px;
        }

        .auth-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 490px;
            border: none;
            border-radius: 36px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.04);
        }

        /* --- Header Segment --- */
        .auth-header {
            background-color: var(--brand-green);
            padding: 24px 32px;
            display: flex;
            align-items: center;
            color: #ffffff;
        }

        .brand-logo-fallback {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.25);
            font-size: 1.2rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        .header-title-area {
            margin-left: 10px;
            line-height: 1.2;
        }

        .system-tag {
            font-size: 0.9rem;
            opacity: 0.9;
            font-weight: 500;
            border-left: 2px solid rgba(226, 214, 214, 0.801);
            padding-left: 22px;
            margin-left: auto;
        }

        /* --- Form Elements --- */
        .auth-body {
            padding: 40px 40px;
        }

        .auth-body h2 {
            font-size: 2rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .account-switch-text {
            font-size: 0.95rem;
            color: #666666;
            margin-bottom: 32px;
        }

        .account-switch-text a {
            color: var(--link-blue);
            text-decoration: none;
            font-weight: 500;
        }

        .account-switch-text a:hover {
            text-decoration: underline;
        }

        .form-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #444444;
            margin-bottom: 8px;
        }

        /* --- Enhanced Input Group Elements --- */
        .input-group-text-flag {
            background-color: #f8f9fa;
            border: 1px solid #ced4da;
            border-right: none;
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
            padding-left: 14px;
            padding-right: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-group-text-flag img {
            width: 24px;
            height: 16px;
            object-fit: cover;
            border-radius: 1px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .country-select-dropdown {
            max-width: 95px;
            border-top-left-radius: 0px !important;
            border-bottom-left-radius: 0px !important;
            border-top-right-radius: 0px !important;
            border-bottom-right-radius: 0px !important;
            background-color: #f8f9fa;
            font-weight: 500;
            cursor: pointer;
            border-left: none;
            padding-left: 4px;
        }

        .phone-input-field {
            border-top-left-radius: 0px !important;
            border-bottom-left-radius: 0px !important;
            border-top-right-radius: 8px !important;
            border-bottom-right-radius: 8px !important;
            height: 50px;
            font-size: 0.95rem;
            color: #333333;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--brand-teal);
            box-shadow: 0 0 0 0.25rem rgba(15, 163, 164, 0.15);
            z-index: 5;
        }

        /* --- Action Button --- */
        .btn-signin {
            background-color: var(--brand-teal);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            height: 52px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            margin-top: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-signin:hover {
            background-color: #0d8c8d;
            color: #ffffff;
        }

        .btn-signin:active {
            transform: scale(0.99);
        }

        /* --- Minimalist Base Footer --- */
        footer {
            background-color: #ffffff;
            border-top: 1px solid #eef2f5;
            padding: 14px 24px;
            font-size: 0.8rem;
            color: #555555;
            z-index: 10;
            width: 100%;
        }

        .footer-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 100%;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .bg-left, .bg-right { display: none; }
            .auth-header { flex-direction: column; align-items: flex-start; gap: 12px; padding: 20px; }
            .system-tag { border-left: none; padding-left: 0; margin-left: 0; }
            .auth-body { padding: 30px 24px; }
            .footer-container { flex-direction: column; gap: 8px; text-align: center; }
        }
    </style>
</head>

<body>

    <div class="bg-blobs-container">
        <div class="bg-left"></div>
        <div class="bg-right"></div>
    </div>

    <div class="main-content">
        <div class="card auth-card">

            <div class="auth-header">
                <div class="brand-logo-fallback">
                    <img src="assets/images/pbllogo.svg" alt="Pubali Logo" width="40" height="40" onerror="this.style.display='none'">
                </div>
                <div class="header-title-area">
                    <div class="title-bangla">
                        <img src="assets/images/pbllogotext.svg" alt="Pubali Bank" width="170" height="40" onerror="this.style.display='none'">
                    </div>
                </div>
                <div class="system-tag">
                    E-recruitment System
                </div>
            </div>

            <div class="auth-body">
                <h2>Create account.</h2>
                <div class="account-switch-text">
                    Have an account <a href="#">Log in</a>
                </div>

                <!-- Registration Form -->
                <form id="signInForm" autocomplete="on" class="needs-validation" novalidate>
                    <div class="mb-4">
                        <label for="phoneNumberField" class="form-label">Mobile Number</label>
                        <div class="input-group">
                            <!-- Clean Flag Wrapper Input Component -->
                            <span class="input-group-text-flag" id="flagContainer">
                                <img id="countryFlagIcon" src="https://flagcdn.com/w40/bd.png" alt="Bangladesh Flag">
                            </span>
                            
                            <!-- Country Code Dropdown Menu -->
                            <select class="form-select country-select-dropdown" id="countryCodeField" aria-label="Country Code">
                                <option value="+880" data-flag="bd" selected>+880</option>
                               
                            </select>
                            
                            <!-- Phone Number Input -->
                            <input type="tel" class="form-control phone-input-field" id="phoneNumberField"
                                placeholder="1XXXXXXXXX" required pattern="[0-9]{9,11}" autocomplete="tel">
                            <div class="invalid-feedback">Please provide a valid mobile number.</div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-signin">
                        Registration <i class="fa-solid fa-arrow-right-long"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-container">
            <div>
                &copy; 2026 Pubali HR Management System. All rights reserved.
            </div>
            <div>
                Last updated: June 15, 2026 &nbsp; &nbsp; | &nbsp; &nbsp; System Version: v1.0.0
            </div>
        </div>
    </footer>

    <script>
        // Dynamic Country Flag Switch Utility Logic
        document.getElementById('countryCodeField').addEventListener('change', function() {
            const selectedOption = this.options[this.selectedIndex];
            const flagCode = selectedOption.getAttribute('data-flag');
            const flagImageElement = document.getElementById('countryFlagIcon');
            
            // Seamlessly updates the FlagCDN asset target pointer
            if(flagCode) {
                flagImageElement.src = `https://flagcdn.com/w40/${flagCode}.png`;
                flagImageElement.alt = selectedOption.text + " Flag";
            }
        });

        // Fixed Form Submission Intercept Handler & Validation Checking
        (() => {
            'use strict'
            const form = document.getElementById('signInForm');
            
            form.addEventListener('submit', function (e) {
                e.preventDefault();
                
                if (!form.checkValidity()) {
                    e.stopPropagation();
                    form.classList.add('was-validated');
                } else {
                    const countryCode = document.getElementById('countryCodeField').value;
                    const phoneNumber = document.getElementById('phoneNumberField').value;
                    
                    alert('Registration request successfully initiated for phone target: ' + countryCode + ' ' + phoneNumber);
                    form.classList.remove('was-validated');
                }
            }, false);
        })();
    </script>

    <!-- Bootstrap Execution Bundle Script Components -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
